# ============================
# 登录测试数据
# ============================

# 有效账号
valid_users:
  - username: "admin"
    password: "Admin@123"
    nickname: "管理员"
    role: "admin"

  - username: "user01"
    password: "User@123"
    nickname: "普通用户"
    role: "user"

  - username: "vip_user"
    password: "Vip@123"
    nickname: "VIP用户"
    role: "vip"

# 异常登录场景
invalid_cases:
  - case_name: "空用户名"
    username: ""
    password: "any_password"
    expected_msg: "请输入用户名"

  - case_name: "空密码"
    username: "admin"
    password: ""
    expected_msg: "请输入密码"

  - case_name: "用户名不存在"
    username: "not_exist_user"
    password: "Wrong@123"
    expected_msg: "用户名或密码错误"

  - case_name: "密码错误"
    username: "admin"
    password: "wrong_password"
    expected_msg: "用户名或密码错误"

  - case_name: "账号被锁定"
    username: "locked_user"
    password: "any"
    expected_msg: "账号已被锁定，请联系管理员"

  - case_name: "SQL注入尝试"
    username: "admin' OR '1'='1"
    password: "anything"
    expected_msg: "用户名或密码错误"

  - case_name: "XSS注入尝试"
    username: "<script>alert('xss')</script>"
    password: "anything"
    expected_msg: "用户名包含非法字符"

# 多次错误登录后锁定
lockout_test:
  username: "lock_test_user"
  wrong_password: "wrong"
  max_attempts: 5
  lockout_msg: "密码错误次数过多，账号已被锁定30分钟"

# 记住密码测试
remember_me_test:
  username: "admin"
  password: "Admin@123"
