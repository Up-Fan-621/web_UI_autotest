    expected_min_count: 4
  - tab: "pending"
    expected_min_count: 1
  - tab: "paid"
    expected_min_count: 1
  - tab: "shipped"
    expected_min_count: 1
  - tab: "completed"
    expected_min_count: 1
  - tab: "cancelled"
    expected_count: 0

# 下单测试数据
create_order_test:
  product_id: 3001
  product_name: "新测试商品"
  quantity: 2
  expected_total: 198.00

# 取消订单测试
cancel_order_test:
  order_id: "TEST_CANCEL_001"
  expected_status_after: "cancelled"

# 支付订单测试
pay_order_test:
  order_id: "TEST_PAY_001"
  payment_method: "alipay"
