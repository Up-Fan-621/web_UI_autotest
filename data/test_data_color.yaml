# ============================
# 颜色识别测试数据
# ============================
# 数据驱动 test_color_recognition.py 和业务颜色验证用例
#
# 结构说明：
#   color_tool_unit:  ColorTool 工具类单元测试数据（无需浏览器）
#   css_color_parse:  Selenium CSS 颜色格式解析测试数据
#   color_comparison: 颜色比较测试数据（距离 / 容差匹配）
#   color_semantics:  语义判断测试数据（颜色名称 / 明暗 / 对比度）
#   color_utilities:  工具方法测试数据（亮度 / 混合 / 取反 / 提亮 / 加深）
#   ui_color_cases:   UI 页面颜色验证数据（需浏览器，JS 注入测试元素）

# ========== 一、ColorTool 工具类单元测试数据 ==========

color_tool_unit:
  format_conversion:
    # HEX → RGB
    - input: "#ff0000"
      expected_rgb: [255, 0, 0]
    - input: "#00ff00"
      expected_rgb: [0, 255, 0]
    - input: "#0000ff"
      expected_rgb: [0, 0, 255]
    # 短格式 HEX
    - input: "#f00"
      expected_rgb: [255, 0, 0]
    # RGB → HEX
    - input_rgb: [255, 0, 0]
      expected_hex: "#ff0000"
    - input_rgb: [0, 128, 0]
      expected_hex: "#008000"
    # HEX → HSL（允许小范围误差）
    - input: "#ff0000"
      expected_hsl: [0.0, 100.0, 50.0]
      tolerance: 0.5
    # HEX → HSV
    - input: "#000000"
      expected_hsv: [0.0, 0.0, 0.0]

# ========== 二、Selenium CSS 颜色格式解析 ==========

css_color_parse:
  # Selenium value_of_css_property 可能返回的各种格式
  cases:
    - name: "rgb() 格式 - 红色"
      css_value: "rgb(255, 0, 0)"
      expected_hex: "#ff0000"
    - name: "rgb() 格式 - 蓝色"
      css_value: "rgb(0, 128, 255)"
      expected_hex: "#0080ff"
    - name: "rgba() 格式 - 完全不透明"
      css_value: "rgba(255, 0, 0, 1)"
      expected_hex: "#ff0000"
    - name: "rgba() 格式 - 半透明"
      css_value: "rgba(0, 0, 0, 0.8)"
      expected_hex: "#000000"
    - name: "已是 HEX 格式"
      css_value: "#ff0000"
      expected_hex: "#ff0000"
    - name: "大写 HEX 格式"
      css_value: "#ABCDEF"
      expected_hex: "#abcdef"
    - name: "CSS 颜色名 - red"
      css_value: "red"
      expected_hex: "#ff0000"
    - name: "CSS 颜色名 - blue"
      css_value: "blue"
      expected_hex: "#0000ff"
    - name: "CSS 颜色名 - white"
      css_value: "white"
      expected_hex: "#ffffff"
    - name: "空值"
      css_value: ""
      expected_hex: ""
    - name: "纯空格"
      css_value: "   "
      expected_hex: ""

# ========== 三、颜色比较测试数据 ==========

color_comparison:
  # 距离计算（欧氏距离）
  distance_cases:
    - name: "完全相同"
      color1: "#ff0000"
      color2: "#ff0000"
      expected_distance: 0.0
      tolerance: 0.1
    - name: "黑白之间"
      color1: "#000000"
      color2: "#ffffff"
      expected_distance: 441.67
      tolerance: 1.0

  # 容差匹配
  similar_cases:
    - name: "微小色差 - 应匹配"
      color1: "#ff0000"
      color2: "#fe0001"
      tolerance: 5
      expected: true
    - name: "微小色差 - 零容差"
      color1: "#ff0000"
      color2: "#fe0001"
      tolerance: 0
      expected: false
    - name: "明显色差 - 不匹配"
      color1: "#ff0000"
      color2: "#0000ff"
      tolerance: 10
      expected: false

# ========== 四、语义判断测试数据 ==========

color_semantics:
  # 颜色名称
  color_names:
    - hex: "#ff0000"
      name_en: "red"
      name_cn: "红色"
    - hex: "#00ff00"
      name_en: "green"
      name_cn: "绿色"
    - hex: "#0000ff"
      name_en: "blue"
      name_cn: "蓝色"
    - hex: "#000000"
      name_en: "black"
      name_cn: "黑色"
    - hex: "#ffffff"
      name_en: "white"
      name_cn: "白色"
    - hex: "#808080"
      name_en: "gray"
      name_cn: "灰色"

  # 明暗判断
  brightness_cases:
    - name: "深色"
      hex: "#333333"
      is_dark: true
      is_light: false
    - name: "浅色"
      hex: "#f0f0f0"
      is_dark: false
      is_light: true

  # WCAG 对比度
  contrast_cases:
    - name: "黑白 - 高对比度"
      color1: "#000000"
      color2: "#ffffff"
      min_ratio: 4.5
      expected: true
    - name: "白灰 - 低对比度"
      color1: "#ffffff"
      color2: "#f0f0f0"
      min_ratio: 4.5
      expected: false

# ========== 五、工具方法测试数据 ==========

color_utilities:
  # 亮度
  brightness:
    - hex: "#000000"
      expected: 0.0
    - hex: "#ffffff"
      expected: 255.0
    - hex: "#808080"
      expected: 128.0

  # 颜色混合
  blend:
    - color1: "#ff0000"
      color2: "#0000ff"
      ratio: 0.5
      expected: "#800080"

  # 取反
  invert:
    - hex: "#ffffff"
      expected: "#000000"
    - hex: "#ff0000"
      expected: "#00ffff"

  # 提亮 / 加深
  lighten:
    - hex: "#333333"
      amount: 30
      expected: "#515151"
  darken:
    - hex: "#999999"
      amount: 30
      expected: "#6b6b6b"

  # CSS 字符串转换
  to_css:
    - hex: "#ff0000"
      expected: "rgb(255, 0, 0)"

# ========== 六、UI 页面颜色验证数据（JS 注入） ==========

ui_color_cases:
  # 自定义颜色验证：JS 创建带颜色的 DOM 元素后验证
  single_element:
    - name: "红色文字 + 绿色背景"
      text_color: "#ff0000"
      bg_color: "#00ff00"
      expected_text_name: "red"
      expected_bg_name: "green"
    - name: "蓝色文字 + 黄色背景"
      text_color: "#0000ff"
      bg_color: "#ffff00"
      expected_text_name: "blue"
      expected_bg_name: "yellow"
    - name: "深绿文字 + 黑色背景"
      text_color: "#008000"
      bg_color: "#000000"
      expected_text_name: "green"
      expected_bg_name: "black"

  # 数据驱动批量验证（pytest.mark.parametrize 直接使用）
  ddt_color_cases:
    - name: "红色文字_白色背景"
      css_color: "#ff0000"
      css_bg: "#ffffff"
      expected_name: "red"
      expected_bg_name: "white"
    - name: "蓝色文字_黄色背景"
      css_color: "#0000ff"
      css_bg: "#ffff00"
      expected_name: "blue"
      expected_bg_name: "yellow"
    - name: "绿色文字_黑色背景"
      css_color: "#008000"
      css_bg: "#000000"
      expected_name: "green"
      expected_bg_name: "black"

  # 颜色变化等待场景
  color_change:
    initial_bg: "#333333"
    initial_text: "#ffffff"
    final_bg: "#1890ff"
    timeout: 5

  # WCAG 对比度验证场景
  contrast_validation:
    - name: "主按钮 - 文字与背景"
      text_color: "#ffffff"
      bg_color: "#1890ff"
      min_ratio: 4.5
    - name: "错误提示 - 文字与背景"
      text_color: "#ff4d4f"
      bg_color: "#fff2f0"
      min_ratio: 3.0
    - name: "成功提示 - 文字与背景"
      text_color: "#52c41a"
      bg_color: "#f6ffed"
      min_ratio: 3.0
