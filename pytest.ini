[pytest]
# Pytest 配置文件

# 测试文件发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 标记注册
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关
    search: 搜索相关
    order: 下单相关
    p0: P0级用例（核心功能）
    p1: P1级用例（重要功能）
    p2: P2级用例（一般功能）
    color: 颜色识别测试
    image: 图片识别测试
    ui_color: 颜色识别集成测试（需浏览器）
    ui_image: 图片识别集成测试（需浏览器）

# 命令行默认参数
addopts = -v --alluredir=reports/html/results --clean-alluredir

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 最小 Python 版本
minversion = 7.4
