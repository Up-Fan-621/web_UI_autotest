# --- 浏览器配置 ---
browser: chrome
headless: true
implicit_wait: 10
explicit_wait: 15
page_load_timeout: 30

# --- 截图配置 ---
screenshot_on_fail: true

# --- 图片识别 ---
image_match_threshold: 0.8
ocr_lang: chi_sim+eng

# --- 邮件通知 ---
email:
  smtp_host: smtp.company.com
  smtp_port: 465
  smtp_user: qa-notice@company.com
  smtp_password: ${SMTP_PASSWORD}
  notify_list:
    - qa-team@company.com
    - dev-team@company.com
